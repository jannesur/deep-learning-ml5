<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ml5 Framework</title>
    <link rel="stylesheet" href="./style.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <script src="./app.js" defer></script>
</head>
<body>
<header class="header">
    <h1>Bildklassifikation mit dem ml5 Framework</h1>
</header>

<main class="container">

    <section class="panel">
        <h2>3 Beispiele für korrekt klassifizierte Bilder</h2>
        <div id="correct-list" class="card-list"></div>
    </section>

    <section class="panel">
        <h2>3 Beispiele für falsch klassifizierte Bilder</h2>
        <div id="wrong-list" class="card-list"></div>
    </section>

</main>
</body>
</html>
